<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-np-wrap" bgcolor="{BG}">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td class="info-np-masthead" bgcolor="{BG_TOP}" align="center">
                        <span class="info-np-icon">{ICON}</span>
                        <span class="info-np-mast-title">{TITLE}</span>
                    </td>
                </tr>
                <tr>
                    <td class="info-np-dateline" bgcolor="{BG}">
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
                <tr>
                    <td class="info-np-rule-row" bgcolor="{BG}">
                        <div class="info-np-rule-thick"></div>
                        <div class="info-np-rule-thin"></div>
                    </td>
                </tr>
                <tr>
                    <td class="info-np-body" bgcolor="{BG}">
                        {ORNAMENT_BLOCK}
                        <div class="prem-content">{CONTENT}</div>
                        <div class="info-np-rule-thin"></div>
                        {FOOTER_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
