<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-ps-wrap" bgcolor="{BG}" align="center">
            <table class="info-ps-border" width="92%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="info-ps-inner" bgcolor="{BG}">
                        <p class="info-ps-corner info-ps-corner-tl">✦</p>
                        <p class="info-ps-corner info-ps-corner-tr">✦</p>
                        <div class="info-ps-icon">{ICON}</div>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                        {ORNAMENT_BLOCK}
                        <div class="info-ps-rule"></div>
                        <div class="prem-content">{CONTENT}</div>
                        {FOOTER_BLOCK}
                        <p class="info-ps-corner info-ps-corner-bl">✦</p>
                        <p class="info-ps-corner info-ps-corner-br">✦</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
