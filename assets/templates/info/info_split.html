<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-sp-top" bgcolor="{BG_TOP}" align="center">
            <table width="90%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td width="16%" class="info-sp-icon" align="center" valign="middle">{ICON}</td>
                    <td width="84%" valign="middle">
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
            </table>
            {ORNAMENT_BLOCK}
        </td>
    </tr>
    <tr>
        <td width="{DOC_WIDTH}" class="info-sp-bottom" bgcolor="{BG}">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td width="8" class="info-sp-accent" bgcolor="{BG}">&nbsp;</td>
                    <td class="info-sp-content" bgcolor="{BG}">
                        <div class="prem-content">{CONTENT}</div>
                        {FOOTER_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
