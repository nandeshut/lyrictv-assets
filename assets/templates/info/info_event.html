<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-ev-ribbon" bgcolor="{BG_TOP}" align="center">
            <p>
                <span class="info-ev-icon">{ICON}</span>
                <span class="info-ev-ribbon-title">{TITLE}</span>
            </p>
            {SUBTITLE_BLOCK}
            {PERIOD_BLOCK}
        </td>
    </tr>
    <tr>
        <td width="{DOC_WIDTH}" class="info-ev-body" bgcolor="{BG}" align="center">
            <table class="info-ev-card" width="92%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td>
                        <div class="prem-content">{CONTENT}</div>
                    </td>
                </tr>
            </table>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
