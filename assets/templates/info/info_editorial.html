<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-ed-wrap" bgcolor="{BG}" align="center">
            <p class="info-ed-rule">&#9472; &#10022; &#9472;</p>
            <div class="prem-icon">{ICON}</div>
            <p class="prem-title">{TITLE}</p>
            {SUBTITLE_BLOCK}
            {PERIOD_BLOCK}
            <table class="info-ed-panel" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="info-ed-panel-inner">
                        <div class="prem-content">{CONTENT}</div>
                    </td>
                </tr>
            </table>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
