<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" bgcolor="{BG}">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td width="26%" class="info-hg-sidebar" bgcolor="{BG_TOP}" valign="top" align="center">
                        <div class="info-hg-icon">{ICON}</div>
                        <div class="info-hg-side-label">{SUBTITLE_BLOCK}</div>
                    </td>
                    <td width="74%" class="info-hg-main" bgcolor="{BG}" valign="top">
                        <p class="prem-title">{TITLE}</p>
                        {PERIOD_BLOCK}
                        <div class="info-hg-rule"></div>
                        <div class="prem-content">{CONTENT}</div>
                        {FOOTER_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
