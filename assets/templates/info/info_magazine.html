<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-mz-wrap" bgcolor="{BG}" align="center">
            <table class="info-mz-frame" width="94%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="info-mz-header" bgcolor="{BG_TOP}">
                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td width="18%" class="info-mz-icon" align="center" valign="middle">{ICON}</td>
                                <td width="82%" valign="middle">
                                    <p class="prem-title">{TITLE}</p>
                                    {SUBTITLE_BLOCK}
                                    {PERIOD_BLOCK}
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
                <tr>
                    <td class="info-mz-body" bgcolor="{BG}">
                        {ORNAMENT_BLOCK}
                        <div class="prem-content">{CONTENT}</div>
                        {FOOTER_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
