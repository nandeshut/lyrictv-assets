<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-cd-wrap" bgcolor="{BG}" align="center" valign="top">
            <table class="info-cd-card" width="88%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="info-cd-stripe" bgcolor="{BG_TOP}">&nbsp;</td>
                </tr>
                <tr>
                    <td class="info-cd-body" bgcolor="{BG}">
                        <div class="info-cd-icon">{ICON}</div>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                        {ORNAMENT_BLOCK}
                        <div class="info-cd-divider"></div>
                        <div class="prem-content">{CONTENT}</div>
                        {FOOTER_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
