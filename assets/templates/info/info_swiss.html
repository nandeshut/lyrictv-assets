<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="info-sw-wrap" bgcolor="{BG}" align="left">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td width="6" class="info-sw-accent" bgcolor="{BG}">&nbsp;</td>
                    <td>
                        <p class="info-sw-tag"><span class="info-sw-icon">{ICON}</span> {TAG_LABEL}</p>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
            </table>
            <hr class="info-sw-line" />
            <div class="prem-content info-sw-content">{CONTENT}</div>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
