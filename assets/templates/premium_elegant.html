<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="prem-elegant-wrap" bgcolor="{BG}" align="center">
            <p class="prem-elegant-ornament">&#10022; &#9472;&#9472; &#10022;</p>
            <table class="prem-elegant-frame" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="prem-elegant-side" width="8">&nbsp;</td>
                    <td class="prem-elegant-body" align="center">
                        <div class="prem-icon">{ICON}</div>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                        <div class="prem-content prem-content-elegant">{CONTENT}</div>
                    </td>
                </tr>
            </table>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
