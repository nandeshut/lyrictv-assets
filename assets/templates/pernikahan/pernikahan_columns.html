<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG};height:{DOC_HEIGHT}px">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" height="{DOC_HEIGHT}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}" class="ultah-sh-frame">
    <tr>
        <td width="{DOC_WIDTH}" height="{DOC_HEIGHT}" class="wn-sh-columns" bgcolor="{BG}" valign="top">
            <table class="ultah-sh-vfill" width="100%" height="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td class="ultah-sh-head" valign="top" align="left">
                        <p class="wn-sh-tag">{TAG_LABEL}</p>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
                <tr>
                    <td class="wn-sh-col-labels" valign="top" align="left">
                        <span class="wn-sh-col-hdr">Nama</span>
                        <span class="wn-sh-col-sep">|</span>
                        <span class="wn-sh-col-hdr">Tanggal</span>
                        <span class="wn-sh-col-sep">|</span>
                        <span class="wn-sh-col-hdr">Usia</span>
                    </td>
                </tr>
                <tr>
                    <td class="ultah-sh-body wn-sh-body" valign="middle" height="100%" align="left">{CONTENT}{FOOTER_BLOCK}</td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
