<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="prem-banner-head" bgcolor="{BG_TOP}" align="center">
            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td align="center" class="prem-banner-inner">
                        <div class="prem-banner-chip">{ICON}</div>
                        <p class="prem-banner-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td width="{DOC_WIDTH}" class="prem-main prem-main-banner" bgcolor="{BG}" align="center">
            <div class="prem-content prem-content-banner">{CONTENT}</div>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
