<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warta</title>
    <style>
        {CSS_CONTENT}
    </style>
</head>
<body>
    <div class="warta-container {THEME_CLASS}">
        <div class="warta-header">
            <h2>{TITLE}</h2>
        </div>
        
        <div class="warta-table-wrapper">
            <table class="warta-table">
                <thead>
                    <tr>
                        {HEADERS}
                    </tr>
                </thead>
                <tbody>
                    {ROWS}
                </tbody>
            </table>
        </div>
        
        <div class="warta-footer">
            <p>Data per {DATE}</p>
        </div>
    </div>
</body>
</html>
