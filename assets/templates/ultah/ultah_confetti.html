<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG};height:{DOC_HEIGHT}px">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" height="{DOC_HEIGHT}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}" class="ultah-sh-frame">
    <tr>
        <td width="{DOC_WIDTH}" height="{DOC_HEIGHT}" class="ultah-sh-confetti" bgcolor="{BG}" valign="top" align="center">
            <table class="ultah-sh-vfill" width="100%" height="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td class="ultah-sh-confetti-strip" bgcolor="{BG_TOP}" valign="middle" align="center">
                        <div class="ultah-sh-confetti-icons">{ORNAMENT_BLOCK}</div>
                        <p class="prem-title">{TITLE}</p>
                        {SUBTITLE_BLOCK}
                        {PERIOD_BLOCK}
                    </td>
                </tr>
                <tr>
                    <td class="ultah-sh-body" valign="middle" height="100%" align="center">
                        <div class="prem-icon ultah-sh-confetti-cake">{ICON}</div>
                        {CONTENT}
                        <div class="ultah-sh-foot">{FOOTER_BLOCK}</div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
