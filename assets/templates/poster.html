<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warta</title>
    <style>
        {CSS_CONTENT}
    </style>
</head>
<body>
    <div class="warta-container {THEME_CLASS}">
        <div class="warta-decoration">{DECORATION}</div>
        
        <div class="warta-header">

            <p>{SUBTITLE}</p>

        <div class="warta-grid">
            {CARDS}

        <div class="warta-footer">
            <p>Data per {DATE}</p>
        </div>
    </div>
</body>
</html>
