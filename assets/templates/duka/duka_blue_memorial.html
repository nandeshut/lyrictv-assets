<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-duka-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="dk-sh-blue-memorial" bgcolor="{BG}" align="center">
            <table class="dk-sh-memorial-head" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td align="center">
                        {TAG_BLOCK}
                        {ORNAMENT_BLOCK}
                        <div class="duka-icon">{ICON}</div>
                        <p class="duka-title">{TITLE}</p>
                        <p class="duka-subtitle">{SUBTITLE}</p>
                    </td>
                </tr>
            </table>
            <div class="dk-sh-memorial-body">
                {NAME_BLOCK}
                <div class="duka-details">{DETAILS}{BODY_FALLBACK}</div>
                <p class="duka-footer-text">{FOOTER}</p>
            </div>
        </td>
    </tr>
</table>
</body>
</html>
