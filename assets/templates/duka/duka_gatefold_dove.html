<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-duka-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="dk-sh-gatefold" bgcolor="{BG}" align="center">
            <table class="dk-sh-gate-top" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                    <td align="center">
                        {ORNAMENT_BLOCK}
                        <div class="duka-icon duka-icon-hero">{ICON}</div>
                    </td>
                </tr>
            </table>
            {VERSE_BLOCK}
            <p class="duka-title">{TITLE}</p>
            <p class="duka-subtitle">{SUBTITLE}</p>
            {DIVIDER_BLOCK}
            {NAME_BLOCK}
            <div class="duka-details">{DETAILS}{BODY_FALLBACK}</div>
            <p class="duka-footer-text">{FOOTER}</p>
        </td>
    </tr>
</table>
</body>
</html>
