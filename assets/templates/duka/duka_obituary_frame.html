<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-duka-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="dk-sh-obit-wrap" bgcolor="{BG}" align="center">
            <table class="dk-sh-obit-frame" width="88%" cellpadding="0" cellspacing="0" border="0" align="center">
                <tr>
                    <td class="dk-sh-obit-inner" bgcolor="{BG}" align="center">
                        {LABEL_BLOCK}
                        {ORNAMENT_BLOCK}
                        <div class="duka-icon duka-icon-minimal">{ICON}</div>
                        <p class="duka-title">{TITLE}</p>
                        <p class="duka-subtitle">{SUBTITLE}</p>
                        {DIVIDER_TOP}
                        {NAME_BLOCK}
                        {DIVIDER_MID}
                        <div class="duka-details">{DETAILS}{BODY_FALLBACK}</div>
                        <p class="duka-footer-text">{FOOTER}</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
