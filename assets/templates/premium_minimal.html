<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>{CSS_CONTENT}</style>
</head>
<body bgcolor="{BG}" style="margin:0;padding:0;background-color:{BG}">
<!-- warta-premium-bg:{BG} -->
<table width="{DOC_WIDTH}" cellpadding="0" cellspacing="0" border="0" bgcolor="{BG}">
    <tr>
        <td width="{DOC_WIDTH}" class="prem-main prem-main-minimal" bgcolor="{BG}" align="left">
            <p class="prem-min-label">{ICON} &nbsp; INFO</p>
            <p class="prem-title prem-title-minimal">{TITLE}</p>
            {SUBTITLE_BLOCK}
            {PERIOD_BLOCK}
            <hr class="prem-min-divider" />
            <div class="prem-content prem-content-minimal">{CONTENT}</div>
            {FOOTER_BLOCK}
        </td>
    </tr>
</table>
</body>
</html>
